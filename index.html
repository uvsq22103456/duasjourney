        // ============ NAVIGATION ============
        function showView(id) {
            ['home-view', 'situations-view', 'builder-view', 'success-view', 'journal-view', 'daily-view'].forEach(v => {
                document.getElementById(v).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        // ============ RENDER ACCUEIL ============
        function renderHome() {
            const grid = document.getElementById('categories-grid');
            grid.innerHTML = DUA_CATEGORIES.map(cat => `
                <button onclick="openCategory('${cat.id}')" class="card p-5 text-left active:scale-95 transition-all w-full flex items-center gap-4">
                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-3xl flex-shrink-0 ${cat.color}">${cat.emoji}</div>
                    <div>
                        <p class="font-bold text-base text-stone-800">${cat.title}</p>
                        <p class="text-[10px] text-stone-400 uppercase tracking-widest font-bold mt-1">${cat.subtitle}</p>
                    </div>
                </button>
            `).join('');
            lucide.createIcons();
        }

            document.getElementById('sit-title').innerText = cat.title;
            document.getElementById('sit-emoji').innerText = cat.emoji;
            
            const list = document.getElementById('situations-list');
            list.innerHTML = cat.situations.map((sit, idx) => `
                <button onclick="startDua('${cat.id}', ${idx})" class="card p-5 text-left active:scale-95 transition-all w-full mb-3 fade-up" style="animation-delay: ${idx * 0.1}s">
                    <p class="font-bold text-sm ${cat.textC} mb-1">${sit.title}</p>
                    <p class="text-xs text-stone-500 leading-relaxed">${sit.desc}</p>
                </button>
            `).join('');
            
            showView('situations-view');
        };

        // ============ DEMARRER LE BUILDER ============
        window.startDua = (catId, sitIdx) => {
            const cat = DUA_CATEGORIES.find(c => c.id === catId);
            currentSituation = cat.situations[sitIdx];
            currentStep = 1;
            renderBuilderStep();
            showView('builder-view');
        };

        // ============ LOGIQUE DU BUILDER ============
        function renderBuilderStep() {
            const content = document.getElementById('builder-content');
            const progress = document.getElementById('builder-progress');
            progress.style.width = `${(currentStep / 5) * 100}%`;
            document.getElementById('step-indicator').innerText = `Étape ${currentStep} / 5`;

            content.innerHTML = '';
            
            let html = '';
            if (currentStep === 1) {
                document.getElementById('step-title').innerText = "1. La Louange (Alhamdulillah)";
                html = `
                    <div class="fade-up text-center pt-8 pb-4">
                        <div class="text-5xl mb-6 anim-pulse">✨</div>
                        <p class="text-sm text-stone-500 italic mb-6">On ne demande pas à un Roi sans d'abord Le remercier.</p>
                        <div class="card p-6 bg-amber-50 border-amber-200 shadow-sm text-left">
                            <p class="text-amber-800 font-medium leading-relaxed text-lg">"${currentSituation.praise}"</p>
                        </div>
                    </div>`;
            } 
            else if (currentStep === 2) {
                document.getElementById('step-title').innerText = "2. Salawat sur le Prophète ﷺ";
                html = `
                    <div class="fade-up text-center pt-8 pb-4">
                        <div class="text-5xl mb-6 anim-pulse">🕊️</div>
                        <p class="text-sm text-stone-500 italic mb-6">"L'invocation est suspendue entre le ciel et la terre, rien n'en monte tant que tu n'as pas prié sur ton Prophète."</p>
                        <div class="card p-6 bg-slate-50 border-slate-200 shadow-sm text-left">
                            <p class="amiri text-2xl text-slate-700 text-right mb-4 leading-loose">اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى نَبِيِّنَا مُحَمَّدٍ</p>
                            <p class="text-slate-800 font-medium leading-relaxed">"Allahumma salli wa sallim 'ala nabiyyina Muhammad."</p>
                        </div>
                    </div>`;
            }
            else if (currentStep === 3) {
                document.getElementById('step-title').innerText = "3. Le Nom Parfait d'Allah";
                html = `
                    <div class="fade-up text-center pt-8 pb-4">
                        <div class="text-5xl mb-6 anim-pulse">🌿</div>
                        <div class="card p-6 shadow-md border-rose-200 text-center" style="background: linear-gradient(to bottom right, #ffffff, #FDF8F3);">
                            <p class="amiri text-5xl text-rose-500 mb-4">${currentSituation.allahName.ar}</p>
                            <p class="playfair text-3xl font-bold text-stone-800 mb-2">Ya ${currentSituation.allahName.name}</p>
                            <p class="text-sm text-stone-600 leading-relaxed italic border-t pt-4 mt-2">"${currentSituation.allahName.meaning}"</p>
                        </div>
                    </div>`;
            }
            else if (currentStep === 4) {
                document.getElementById('step-title').innerText = "4. L'Invocation Prophétique";
                html = `
                    <div class="fade-up pt-4 pb-4">
                        <div class="card p-6 shadow-sm border-stone-200 bg-white">
                            <button onclick="playAudio('${currentSituation.dua.ar}')" class="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-indigo-500 bg-indigo-50 px-3 py-1.5 rounded-full mb-6 active:scale-95 transition-all">
                                <i data-lucide="volume-2" class="w-4 h-4"></i> Écouter
                            </button>
                            <p class="amiri text-3xl text-stone-800 text-right mb-6 leading-loose">${currentSituation.dua.ar}</p>
                            <div class="bg-stone-50 p-4 rounded-xl border border-stone-100 mb-4">
                                <p class="text-xs text-stone-400 font-bold uppercase tracking-widest mb-1">Prononciation</p>
                                <p class="text-sm text-stone-700 font-medium">${currentSituation.dua.tr}</p>
                            </div>
                            <div>
                                <p class="text-xs text-stone-400 font-bold uppercase tracking-widest mb-1">Sens</p>
                                <p class="text-base text-stone-600 italic leading-relaxed">"${currentSituation.dua.fr}"</p>
                            </div>
                        </div>
                    </div>`;
            }
            else if (currentStep === 5) {
                document.getElementById('step-title').innerText = "5. Ta Demande Personnelle";
                html = `
                    <div class="fade-up pt-6 pb-4">
                        <div class="text-center mb-6">
                            <div class="text-5xl mb-4 anim-pulse">🤲</div>
                            <p class="text-sm text-stone-600 leading-relaxed">Les portes du Ciel sont ouvertes.</p>
                            <p class="text-sm font-bold text-rose-500 mt-2">Parle-Lui avec tes propres mots en français, Il t'écoute.</p>
                        </div>
                        <textarea id="custom-dua-text" rows="5" placeholder="Ô Allah, je Te demande de..." class="w-full rounded-2xl px-5 py-4 text-base outline-none border focus:border-rose-300 shadow-sm resize-none bg-white" style="color:var(--text);"></textarea>
                    </div>`;
            }

            content.innerHTML = html;
            lucide.createIcons();

            const btn = document.getElementById('builder-next-btn');
            if (currentStep < 5) {
                btn.innerText = "Étape Suivante ➔";
                btn.onclick = () => { currentStep++; renderBuilderStep(); };
            } else {
                btn.innerText = "Terminer et Sauvegarder ✨";
                btn.onclick = () => finishDua();
            }
        }

        // ============ FINIR ET SAUVEGARDER ============
        function finishDua() {
            const customText = document.getElementById('custom-dua-text').value.trim();
            
            if (customText !== "") {
                let savedDuas = JSON.parse(localStorage.getItem('samia-journal-duas')) || [];
                const newDua = {
                    theme: currentSituation.title,
                    text: customText,
                    date: new Date().toLocaleDateString('fr-FR'),
                    timestamp: Date.now()
                };
                savedDuas.push(newDua);
                localStorage.setItem('samia-journal-duas', JSON.stringify(savedDuas));
            }
            showView('success-view');
        }

        // ============ AFFICHER LE JOURNAL ============
        window.openJournal = () => {
            const list = document.getElementById('journal-list');
            let savedDuas = JSON.parse(localStorage.getItem('samia-journal-duas')) || [];
            
            if (savedDuas.length === 0) {
                list.innerHTML = `<p class="text-stone-400 italic text-sm text-center py-10">Ton journal est vide pour le moment. Fais ta première invocation ! 🌸</p>`;
            } else {
                list.innerHTML = savedDuas.sort((a,b) => b.timestamp - a.timestamp).map((dua, i) => `
                    <div class="card p-5 mb-4 fade-up" style="animation-delay: ${i * 0.1}s">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-black uppercase tracking-widest text-rose-400 bg-rose-50 px-2 py-1 rounded-md">${dua.theme}</span>
                            <span class="text-xs text-stone-400 font-mono">${dua.date}</span>
                        </div>
                        <p class="text-sm text-stone-600 leading-relaxed mt-3">"${dua.text}"</p>
                    </div>
                `).join('');
            }
            showView('journal-view');
        }

        // ============ RENDER DUAS QUOTIDIEN ============
        // ============ RENDER DUAS QUOTIDIEN ============
        window.openDailyDuas = () => {
            const list = document.getElementById('daily-list');
            list.innerHTML = DAILY_DUAS.map((category, i) => `
                <div class="mb-6 fade-up" style="animation-delay: ${i * 0.1}s">
                    <h2 class="flex items-center gap-2 font-bold text-stone-800 text-lg mb-3">
                        <span>${category.icon}</span> ${category.title}
                    </h2>
                    <div class="space-y-3">
                        ${category.list.map(dua => `
                            <details class="card p-4 group cursor-pointer outline-none bg-white">
                                <summary class="font-bold text-sm text-stone-800 flex justify-between items-center list-none">
                                    ${dua.t}
                                    <i data-lucide="chevron-down" class="w-4 h-4 text-stone-300 group-open:rotate-180 transition-transform"></i>
                                </summary>
                                <div class="mt-4 border-t border-stone-100 pt-4">
                                    <button onclick="playAudio('${dua.ar.replace(/'/g, "\\'")}')" class="flex items-center gap-1.5 text-[10px] font-black uppercase tracking-widest text-rose-500 bg-rose-50 px-2.5 py-1 rounded-full mb-4 active:scale-95 transition-all">
                                        <i data-lucide="volume-2" class="w-3 h-3"></i> Écouter
                                    </button>
                                    <p class="amiri text-2xl text-stone-800 text-right leading-loose mb-3">${dua.ar}</p>
                                    <p class="text-sm text-stone-600 italic leading-relaxed">"${dua.fr}"</p>
                                </div>
                            </details>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
            showView('daily-view');
        }

        // ============ AUDIO ============
        window.playAudio = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utt = new SpeechSynthesisUtterance(text);
                utt.lang = 'ar-SA'; utt.rate = 0.75;
                window.speechSynthesis.speak(utt);
            } else alert("Ton navigateur ne supporte pas la lecture audio.");
        };

        document.addEventListener("DOMContentLoaded", () => { renderHome(); });
    </script>
</head>
<body class="pb-10">

<div id="home-view" class="px-5">
    <header class="pt-16 pb-6 flex justify-between items-start">
        <div>
            <p class="text-xs uppercase font-bold tracking-widest text-stone-400 mb-1">Dua Builder</p>
            <h1 class="playfair text-4xl font-bold" style="color:#3D2B2B">L'Arme du Croyant 🤲</h1>
        </div>
        <button onclick="openJournal()" class="w-12 h-12 bg-white border border-stone-200 rounded-2xl flex items-center justify-center shadow-sm active:scale-95 transition-all">
            <i data-lucide="book-heart" class="w-5 h-5 text-rose-400"></i>
        </button>
    </header>

    <button onclick="openDailyDuas()" class="w-full card p-4 mb-8 flex items-center justify-between active:scale-95 transition-all" style="background: linear-gradient(135deg, #F9EEE8, #F0D8D8); border-color: #E8C4C4;">
        <div class="flex items-center gap-3">
            <span class="text-2xl">📖</span>
            <div class="text-left">
                <p class="font-bold text-stone-800">Les Duas du Quotidien</p>
                <p class="text-xs text-stone-500">Matin, soir, maison, voiture...</p>
            </div>
        </div>
        <i data-lucide="chevron-right" class="w-5 h-5 text-stone-400"></i>
    </button>

    <h2 class="text-[10px] font-black uppercase tracking-widest text-stone-400 mb-4">Invocations profondes (Pas-à-pas)</h2>
    <div class="grid grid-cols-1 gap-4" id="categories-grid"></div>
</div>

<div id="situations-view" class="hidden px-5">
    <header class="pt-12 pb-6">
        <button onclick="showView('home-view')" class="flex items-center gap-1.5 text-stone-400 font-bold text-xs uppercase tracking-widest mb-6 active:scale-95">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Retour
        </button>
        <div class="flex items-center gap-3">
            <span id="sit-emoji" class="text-4xl"></span>
            <h1 class="playfair text-3xl font-bold text-stone-800" id="sit-title"></h1>
        </div>
    </header>
    <div id="situations-list" class="space-y-2"></div>
</div>

<div id="builder-view" class="hidden px-5 flex flex-col min-h-screen">
    <header class="pt-10 pb-4 shrink-0">
        <button onclick="showView('situations-view')" class="flex items-center gap-1.5 text-stone-400 font-bold text-xs uppercase tracking-widest mb-4">
            <i data-lucide="x" class="w-4 h-4"></i> Annuler
        </button>
        <div class="flex justify-between items-end mb-2">
            <h2 id="step-title" class="font-bold text-lg text-stone-800"></h2>
            <span id="step-indicator" class="text-[10px] uppercase font-black tracking-widest text-rose-400"></span>
        </div>
        <div class="w-full bg-stone-200 rounded-full h-1.5 overflow-hidden">
            <div id="builder-progress" class="bg-rose-400 h-1.5 rounded-full transition-all duration-300"></div>
        </div>
    </header>
    <div id="builder-content" class="flex-1"></div>
    <div class="shrink-0 py-6">
        <button id="builder-next-btn" class="w-full rose-btn py-4 text-base shadow-lg"></button>
    </div>
</div>

<div id="success-view" class="hidden px-5 flex flex-col items-center justify-center min-h-screen text-center pb-10 fade-up">
    <div class="text-7xl mb-6">🕊️</div>
    <h1 class="playfair text-4xl font-bold text-stone-800 mb-4">Invocation sauvegardée</h1>
    <p class="text-stone-600 leading-relaxed mb-10 px-4">"Et votre Seigneur a dit : Appelez-Moi, Je vous répondrai." <br><span class="text-xs text-stone-400 italic">(Coran 40:60)</span></p>
    <button onclick="showView('home-view')" class="w-full card py-4 text-stone-600 font-bold active:scale-95 transition-all border-stone-200 bg-stone-50">
        Retour à l'accueil
    </button>
</div>

<div id="journal-view" class="hidden px-5">
    <header class="pt-12 pb-6">
        <button onclick="showView('home-view')" class="flex items-center gap-1.5 text-stone-400 font-bold text-xs uppercase tracking-widest mb-6 active:scale-95">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Retour
        </button>
        <h1 class="playfair text-3xl font-bold text-stone-800">Mon Journal 📖</h1>
        <p class="text-sm text-stone-500 mt-2">L'historique de tes échanges avec ton Seigneur.</p>
    </header>
    <div id="journal-list" class="pb-10"></div>
</div>

<div id="daily-view" class="hidden px-5">
    <header class="pt-12 pb-6">
        <button onclick="showView('home-view')" class="flex items-center gap-1.5 text-stone-400 font-bold text-xs uppercase tracking-widest mb-6 active:scale-95">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Retour
        </button>
        <h1 class="playfair text-3xl font-bold text-stone-800">Duas du Quotidien ☀️</h1>
        <p class="text-sm text-stone-500 mt-2">La Citadelle pour protéger tes journées.</p>
    </header>
    <div id="daily-list" class="pb-10"></div>
</div>

</body>
</html>
